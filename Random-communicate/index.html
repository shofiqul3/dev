<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>idcalling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="username-screen" id="usernameScreen">
            <div class="connection-card">
                <div class="connection-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Choose Username
                </div>

                <div class="username-setup">
                    <div class="username-label">YOUR USERNAME</div>
                    <div class="username-input-group">
                        <input type="text" id="usernameInput" placeholder="e.g. rahim, karim, jamal" autocomplete="off">
                        <button id="setUsernameBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            Set Username
                        </button>
                        <div class="username-status" id="usernameStatus"></div>
                    </div>
                </div>

                <div class="connection-footer">
                    Choose a unique username to start chatting
                </div>
            </div>
        </div>

        <div class="connection-screen" id="connectionScreen">
            <div class="connection-card">
                <div class="connection-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    P2P Connect
                </div>

                <div class="your-id-box hidden" id="yourIdBox">
                    <div class="your-id-label">YOUR USERNAME</div>
                    <div class="your-id-value">
                        <span class="short-id" id="myIdShort">Loading...</span>
                        <span class="full-id" id="myIdFull"></span>
                        <button class="copy-btn" id="copyBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>

                <div class="connect-form">
                    <input type="text" id="peerInput" placeholder="Enter friend's username...">
                    <button id="connectBtn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                        Connect
                    </button>
                </div>

                <div class="connection-footer">
                    Share your username to connect with friends
                </div>
            </div>
        </div>

        <div class="chat-interface" id="chatInterface">
            <div class="chat-header">
                <button class="back-btn" id="backBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <div class="peer-info">
                    <div class="peer-name" id="peerName">Connecting...</div>
                    <div class="peer-status" id="peerStatus">Online</div>
                </div>
                <div class="call-controls">
                    <button class="mic-btn" id="micPermissionBtn" title="Allow Microphone & Camera" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                        </svg>
                    </button>
                    
                    <button class="call-btn" id="audioCallBtn" title="Audio Call" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15.05 5A5 5 0 0 1 19 8.95M15.05 1A9 9 0 0 1 23 8.94m-1 7.98v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </button>
                    
                    <button class="video-call-btn" id="videoCallBtn" title="Video Call" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 7l-7 5 7 5V7z"/>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="chat-area" id="chatArea">
                <div class="empty-chat" id="emptyChat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <p>No messages yet</p>
                    <small>Say hello to your friend</small>
                </div>
            </div>

            <div class="input-section">
                <button class="smart-btn file-mode" id="smartBtn" title="Click: Switch Mode | Press & Hold: Send File/Record Voice" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                    <span class="mode-indicator" id="modeIndicator">File Mode</span>
                </button>

                <input type="text" class="message-input" id="msgInput" placeholder="Type a message..." disabled>
                <span class="recording-timer" id="recordingTimer">0:00</span>
                <button class="send-btn" id="sendBtn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                    
                </button>
            </div>
        </div>

        <input type="file" id="fileInput" accept="image/*,video/*,audio/*" style="display: none;">

        <div class="upload-progress" id="uploadProgress">
            <span id="uploadFileName">Uploading...</span>
            <div class="progress-bar">
                <div class="progress-fill" id="uploadProgressFill"></div>
            </div>
        </div>

        <!-- New Audio Call Modal with Timer -->
        <div class="call-modal" id="callModal">
            <div class="call-content">
                <div class="call-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="call-peer-name" id="callPeerName">Unknown</div>
                <div class="call-status-badge" id="callStatusBadge">Connected</div>
                <div class="call-timer" id="callTimer">00:00</div>
                
                <div class="call-wave">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>

                <div class="call-actions">
                    <button class="call-action-btn" id="toggleMicCallBtn" title="Mute">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        </svg>
                    </button>
                    <button class="call-action-btn danger" id="endCallBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.574 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Video Call Modal -->
        <div class="video-call-modal" id="videoCallModal">
            <div class="video-container">
                <div class="call-status-text" id="videoCallStatus">Connecting...</div>
                <div class="bandwidth-indicator" id="bandwidthIndicator">
                    <span class="bandwidth-dot good" id="bandwidthDot"></span>
                    <span id="bandwidthText">Good</span>
                </div>
                <div class="quality-badge" id="qualityBadge">HD 720p</div>
                <video class="remote-video" id="remoteVideo" autoplay playsinline></video>
                <div class="local-video-container">
                    <video class="local-video" id="localVideo" autoplay playsinline muted></video>
                </div>
                <div class="call-controls-bottom">
                    <button class="video-call-action-btn" id="toggleMicBtn" title="Mute Microphone">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        </svg>
                    </button>
                    <button class="video-call-action-btn" id="toggleCameraBtn" title="Turn Off Camera">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 7l-7 5 7 5V7z"/>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                        </svg>
                    </button>
                    <button class="video-call-action-btn danger" id="endVideoCallBtn" title="End Call">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.574 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="peerjs.min.js"></script>
    <script src="script.js"> </script>
</body>
                              </html>
